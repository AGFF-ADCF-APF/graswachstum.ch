enabled: true
default_for_all: true
toolbar:
  - undo
  - redo
  - '|'
  - removeformat
  - heading
  - bold
  - italic
  - underline
  - strikethrough
  - link
  - image
  - blockquote
  - bulletList
  - orderedList
  - codeBlock
  - table
  - htmlBlock
  - shortcodeBlock
extra_typography:
  enabled: true
  custom:
    ':)': 😊
    ':(': 😢
    ':D': 😃
    ;): 😉
    ':P': 😛
    ':o': 😮
    ':|': 😐
    ':*': 😘
    B): 😎
    ':/': 😕
    '<3': ❤️
    '</3': 💔
    ~=: ≈
    '[ ': ☐
    '[x': ☑
    (/): ✓
    (x): ✗
